<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Convertico</title>
    <link rel="stylesheet" href="./styles/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <p class="eyebrow">Multi-unit converter</p>
        <h1>Convertico</h1>
        <p class="hero-text">
          Convert values across length, weight, and temperature with a clean,
          easy-to-use interface.
        </p>
        <div class="hero-actions">
          <button type="button" class="hero-chip">
            <a href="./length.html">Length</a>
          </button>
          <button type="button" class="hero-chip">
            <a href="./weight.html">Weight</a>
          </button>
          <button type="button" class="hero-chip">
            <a href="./temperature.html">Temperature</a>
          </button>
        </div>
      </header>

      <section class="card" aria-labelledby="length-title">
        <div class="card-header">
          <h2 id="length-title">Length</h2>
          <p>Millimeter to mile and everything in between.</p>
        </div>

        <form class="converter-form">
          <label class="field">
            <span>Value</span>
            <input type="number" placeholder="Enter value" id="input-value"/>
          </label>

          <div class="select-row">
            <label class="field">
              <span>From</span>
              <select id="from-unit">
                <option value="millimeters">millimeter</option>
                <option value="centimeters">centimeter</option>
                <option value="meters">meter</option>
                <option value="kilometers">kilometer</option>
                <option value="inches">inch</option>
                <option value="feet">foot</option>
                <option value="yards">yard</option>
                <option value="miles">mile</option>
              </select>
            </label>

            <label class="field">
              <span>To</span>
              <select id="to-unit">
                <option value="millimeters">millimeter</option>
                <option value="centimeters">centimeter</option>
                <option value="meters">meter</option>
                <option value="kilometers">kilometer</option>
                <option value="inches">inch</option>
                <option value="feet">foot</option>
                <option value="yards">yard</option>
                <option value="miles">mile</option>
              </select>
            </label>
          </div>

          <div class="actions-row">
            <button type="button" target="_self" id="submit-btn">Convert</button>
            <button type="button" class="reset-btn" id="reset-btn">Reset</button>
          </div>

          <div class="result-box" role="status" aria-live="polite">
            <span class="result-label">Converted value</span>
            <output id="result" default>--</output>
          </div>
        </form>
      </section>
    </div>

    <script src="./scripts/index.js"></script>
  </body>
</html>
